# vvz-explorer - Unified Docker Compose with Profiles
# Usage:
#   Dev:  docker compose --profile dev up
#   Prod: docker compose --profile prod up -d

services:
  # ──────────────────────────────────────────────
  # DEV PROFILE: docker compose --profile dev up
  # ──────────────────────────────────────────────
  backend:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings.dev
      - LECTURES_DB_PATH=/data/lectures_FS2026.db
      - EMBEDDINGS_DB_PATH=/data/embeddings_FS2026.db
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=*
      - CORS_ALLOW_ALL_ORIGINS=True

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  # ──────────────────────────────────────────────
  # PROD PROFILE: docker compose --profile prod up -d
  # ──────────────────────────────────────────────
  backend-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./data:/data
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings.prod
      - LECTURES_DB_PATH=/data/lectures_FS2026.db
      - EMBEDDINGS_DB_PATH=/data/embeddings_FS2026.db
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOW_ALL_ORIGINS=True
    restart: unless-stopped

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-prod:8000/api
      - API_URL=http://backend-prod:8000/api
    depends_on:
      - backend-prod
    restart: unless-stopped

  nginx:
    profiles: ["prod"]
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - staticfiles:/var/www/static
    depends_on:
      - frontend-prod
      - backend-prod
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # VOLUMES
  # ──────────────────────────────────────────────
volumes:
  staticfiles: