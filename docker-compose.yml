name: vvz-explorer

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ../lectures_FS2026.db:/app/lectures_FS2026.db
      - ../embeddings_FS2026.db:/app/embeddings_FS2026.db
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
    ports:
      - "3010:3000"
    depends_on:
      - backend

volumes:
  huggingface_cache:
